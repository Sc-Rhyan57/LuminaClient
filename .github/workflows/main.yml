name: 🔄 Auto Update Minecraft Bedrock Version

on:
  workflow_dispatch:
    inputs:
      mc_version:
        description: 'Nova versão do Minecraft Bedrock (ex: 26.33)'
        required: true
        type: string
      protocol_version:
        description: 'Número do protocolo Bedrock (ex: 1001) — veja em wiki.vg/Bedrock_Protocol'
        required: true
        type: string

jobs:
  update-version:
    name: 🔍 Detectar e Atualizar
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # ────────────────────────────────────────────────────────
      # 1. CHECKOUT
      # ────────────────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # ────────────────────────────────────────────────────────
      # 2. DETECTAR VERSÃO ATUAL
      # ────────────────────────────────────────────────────────
      - name: 🔎 Detectar versão atual no ProtocolHelper.cpp
        id: detect_protocol
        run: |
          FILE="Lunaris/src/main/cpp/ProtocolHelper.cpp"
          NEW_PROTO="${{ inputs.protocol_version }}"

          echo "=== Últimas entradas da tabela ==="
          grep -n 'cloudburstmc/protocol/bedrock/codec' "$FILE" | tail -10

          FALLBACK_PROTO=$(grep -oP 'bedrock/codec/v\K[0-9]+(?=/Bedrock_v[0-9]+")' "$FILE" | sort -n | tail -1)
          echo "fallback_proto=$FALLBACK_PROTO" >> $GITHUB_OUTPUT
          echo "Fallback atual: v${FALLBACK_PROTO}"

          LAST_TABLE_PROTO=$(grep -oP '^\s*\{\s*\K[0-9]+(?=\s*,\s*"org/cloudburstmc/protocol/bedrock/codec)' "$FILE" | sort -n | tail -1)
          echo "last_table_proto=$LAST_TABLE_PROTO" >> $GITHUB_OUTPUT
          echo "Maior protocolo na tabela: v${LAST_TABLE_PROTO}"

          if [ -n "$LAST_TABLE_PROTO" ]; then
            LAST_TABLE_LINE=$(grep -nP "^\s*\{\s*${LAST_TABLE_PROTO}\s*," "$FILE" | grep 'cloudburstmc' | tail -1 | cut -d: -f1)
            echo "last_table_line=$LAST_TABLE_LINE" >> $GITHUB_OUTPUT
            echo "Linha da última entrada: ${LAST_TABLE_LINE}"
          fi

          if grep -qP "^\s*\{\s*${NEW_PROTO}\s*," "$FILE"; then
            echo "proto_already_in_table=true" >> $GITHUB_OUTPUT
            echo "⚠️  v${NEW_PROTO} já existe na tabela — não será duplicado."
          else
            echo "proto_already_in_table=false" >> $GITHUB_OUTPUT
            echo "✅ v${NEW_PROTO} ausente na tabela — será adicionado."
          fi

      - name: 🔎 Detectar versão atual no Lunaris.cpp
        id: detect_lunaris
        run: |
          FILE="Lunaris/src/main/cpp/Lunaris.cpp"

          echo "=== Conteúdo relevante do Lunaris.cpp ==="
          grep -n 'setVersion\|setProtocolVersion\|CallObjectMethod.*version\|CallObjectMethod.*proto' "$FILE"

          CURRENT_MC=$(grep -oP 'CallObjectMethod\s*\([^,]+,\s*setVersion\s*,\s*createJavaString\s*\(\s*env\s*,\s*"\K[^"]+(?=")' "$FILE" | head -1)
          echo "current_mc=$CURRENT_MC" >> $GITHUB_OUTPUT
          echo "Versão MC atual: '${CURRENT_MC}'"

          CURRENT_PROTO=$(grep -oP 'CallObjectMethod\s*\([^,]+,\s*setProtocolVersion\s*,\s*\K[0-9]+(?=\s*\))' "$FILE" | head -1)
          echo "current_proto=$CURRENT_PROTO" >> $GITHUB_OUTPUT
          echo "Protocolo atual: '${CURRENT_PROTO}'"

      # ────────────────────────────────────────────────────────
      # 3. SINCRONIZAR TODO O CÓDIGO DO BEDROCK-CODEC
      # ────────────────────────────────────────────────────────
      - name: "🔄 Sincronizar Codecs (CloudburstMC branch 3.0)"
        id: update_protocol
        run: |
          NEW_PROTO="${{ inputs.protocol_version }}"
          UPSTREAM="https://github.com/CloudburstMC/Protocol.git"

          WORKSPACE="${GITHUB_WORKSPACE}"
          LOCAL_CODEC_BASE="${WORKSPACE}/Protocol/bedrock-codec/src/main/java/org/cloudburstmc/protocol/bedrock/codec"
          CODEC_DIR="${LOCAL_CODEC_BASE}/v${NEW_PROTO}"

          mkdir -p "${LOCAL_CODEC_BASE}"
          rm -rf /tmp/protocol-upstream

          git clone --depth 1 --branch 3.0 --sparse "${UPSTREAM}" /tmp/protocol-upstream
          cd /tmp/protocol-upstream
          git sparse-checkout set bedrock-codec

          UPSTREAM_JAVA="/tmp/protocol-upstream/bedrock-codec/src/main/java"
          LOCAL_JAVA="${WORKSPACE}/Protocol/bedrock-codec/src/main/java"

          echo "🔄 Sincronizando todo o código do bedrock-codec (sobrescrevendo arquivos base)..."
          # O rsync -a sem --ignore-existing sobrescreve os arquivos locais com as versões do upstream.
          # Isso garante que classes base (EntityDataTypes, SoundEvent, BedrockPacketType) sejam atualizadas.
          rsync -a "${UPSTREAM_JAVA}/" "${LOCAL_JAVA}/"
          echo "✅ Código sincronizado com sucesso."

          # Agora limpa o temporário
          rm -rf /tmp/protocol-upstream
          cd "${WORKSPACE}"

          if [ -d "$CODEC_DIR" ]; then
            echo "codec_exists=true" >> $GITHUB_OUTPUT
            echo "✅ Codec v${NEW_PROTO} disponível localmente."
          else
            echo "codec_exists=false" >> $GITHUB_OUTPUT
            echo "❌ Codec v${NEW_PROTO} NÃO encontrado após sincronização."
          fi
          
      # ────────────────────────────────────────────────────────
      # 4. ATUALIZAR ProtocolHelper.cpp
      # ────────────────────────────────────────────────────────
      - name: "✏️ [1/3] Atualizar ProtocolHelper.cpp"
        run: |
          FILE="Lunaris/src/main/cpp/ProtocolHelper.cpp"
          NEW_PROTO="${{ inputs.protocol_version }}"
          FALLBACK="${{ steps.detect_protocol.outputs.fallback_proto }}"
          LAST_TABLE_LINE="${{ steps.detect_protocol.outputs.last_table_line }}"
          ALREADY_IN_TABLE="${{ steps.detect_protocol.outputs.proto_already_in_table }}"

          if [ "$ALREADY_IN_TABLE" = "false" ]; then
            if [ -n "$LAST_TABLE_LINE" ]; then
              sed -i "${LAST_TABLE_LINE}s/}[[:space:]]*$/},/" "$FILE"
              INDENT=$(sed -n "${LAST_TABLE_LINE}p" "$FILE" | grep -oP '^\s+')
              NEW_ENTRY="${INDENT}{ ${NEW_PROTO}, \"org/cloudburstmc/protocol/bedrock/codec/v${NEW_PROTO}/Bedrock_v${NEW_PROTO}\" },"
              sed -i "${LAST_TABLE_LINE}a\\${NEW_ENTRY}" "$FILE"
              echo "✅ Entrada v${NEW_PROTO} adicionada à tabela."
            else
              echo "❌ Não foi possível detectar a última linha da tabela."
              exit 1
            fi
          else
            echo "⏭️  v${NEW_PROTO} já existe na tabela — nenhuma inserção feita."
          fi

          if [ -n "$FALLBACK" ] && [ "$FALLBACK" != "$NEW_PROTO" ]; then
            sed -i \
              "s|/codec/v${FALLBACK}/Bedrock_v${FALLBACK}\"|/codec/v${NEW_PROTO}/Bedrock_v${NEW_PROTO}\"|g" \
              "$FILE"
            echo "✅ Fallback atualizado: v${FALLBACK} → v${NEW_PROTO}"
          else
            echo "⏭️  Fallback já está em v${NEW_PROTO} — sem alteração."
          fi

          echo "=== Estado final das últimas linhas da tabela ==="
          grep -n 'cloudburstmc/protocol/bedrock/codec' "$FILE" | tail -12

      # ────────────────────────────────────────────────────────
      # 5. ATUALIZAR Lunaris.cpp
      # ────────────────────────────────────────────────────────
      - name: "✏️ [2/3] Atualizar Lunaris.cpp"
        run: |
          FILE="Lunaris/src/main/cpp/Lunaris.cpp"
          NEW_MC="${{ inputs.mc_version }}"
          NEW_PROTO="${{ inputs.protocol_version }}"
          OLD_MC="${{ steps.detect_lunaris.outputs.current_mc }}"
          OLD_PROTO="${{ steps.detect_lunaris.outputs.current_proto }}"

          echo "Substituindo: MC '${OLD_MC}' → '${NEW_MC}' | Proto '${OLD_PROTO}' → '${NEW_PROTO}'"

          if [ -n "$OLD_MC" ] && [ "$OLD_MC" != "$NEW_MC" ]; then
            sed -i "/setVersion/s|createJavaString(env, \"${OLD_MC}\")|createJavaString(env, \"${NEW_MC}\")|g" "$FILE"
            echo "✅ Version string atualizada: ${OLD_MC} → ${NEW_MC}"
          else
            echo "⚠️  Version string não detectada ou já atualizada — fazendo substituição direta."
            sed -i "/setVersion/s|createJavaString(env, \"[^\"]*\")|createJavaString(env, \"${NEW_MC}\")|g" "$FILE"
            echo "✅ Version string substituída por fallback: → ${NEW_MC}"
          fi

          if [ -n "$OLD_PROTO" ] && [ "$OLD_PROTO" != "$NEW_PROTO" ]; then
            sed -i "/setProtocolVersion/s|, ${OLD_PROTO});|, ${NEW_PROTO});|g" "$FILE"
            echo "✅ ProtocolVersion atualizado: ${OLD_PROTO} → ${NEW_PROTO}"
          else
            echo "⚠️  ProtocolVersion não detectado ou já atualizado — fazendo substituição direta."
            sed -i "/setProtocolVersion/s|, [0-9]\+);|, ${NEW_PROTO});|g" "$FILE"
            echo "✅ ProtocolVersion substituído por fallback: → ${NEW_PROTO}"
          fi

          echo "=== Verificação pós-edição ==="
          grep -n 'setVersion\|setProtocolVersion\|CallObjectMethod.*version\|CallObjectMethod.*proto' "$FILE"

      # ────────────────────────────────────────────────────────
      # 6. VERIFICAR AutoCodecPacketListener.kt
      # ────────────────────────────────────────────────────────
      - name: "✏️ [3/3] Verificar AutoCodecPacketListener.kt"
        run: |
          LISTENER="Lunaris/src/main/java/com/project/lumina/relay/listener/AutoCodecPacketListener.kt"
          NEW_PROTO="${{ inputs.protocol_version }}"
          OLD_PROTO="${{ steps.detect_lunaris.outputs.current_proto }}"

          if [ ! -f "$LISTENER" ]; then
            echo "⚠️  AutoCodecPacketListener.kt não encontrado — pulando."
            exit 0
          fi

          echo "=== patchCodecIfNeeded atual ==="
          grep -n 'patchCodec\|protocolVersion\s*>\|v[0-9]\{3,4\}' "$LISTENER" | head -20

          if [ -n "$OLD_PROTO" ] && [ "$OLD_PROTO" != "$NEW_PROTO" ]; then
            if grep -qP "\b${OLD_PROTO}\b" "$LISTENER"; then
              sed -i "s/\b${OLD_PROTO}\b/${NEW_PROTO}/g" "$LISTENER"
              echo "✅ Referências a ${OLD_PROTO} atualizadas no listener."
            else
              echo "✅ Sem hardcode do protocolo antigo no listener — nada alterado."
            fi
          else
            echo "✅ Listener OK — nenhuma atualização necessária."
          fi

      # ────────────────────────────────────────────────────────
      # 7. VALIDAÇÃO FINAL
      # ────────────────────────────────────────────────────────
      - name: "🔍 Validação final"
        run: |
          NEW_PROTO="${{ inputs.protocol_version }}"
          NEW_MC="${{ inputs.mc_version }}"
          ERRORS=0

          echo "=== ProtocolHelper.cpp ==="
          if grep -qP "^\s*\{\s*${NEW_PROTO}\s*," Lunaris/src/main/cpp/ProtocolHelper.cpp; then
            echo "✅ v${NEW_PROTO} encontrado na tabela."
          else
            echo "❌ v${NEW_PROTO} NÃO encontrado na tabela!"
            ERRORS=$((ERRORS + 1))
          fi

          if grep -qP "codec/v${NEW_PROTO}/Bedrock_v${NEW_PROTO}" Lunaris/src/main/cpp/ProtocolHelper.cpp; then
            echo "✅ Fallback aponta para v${NEW_PROTO}."
          else
            echo "❌ Fallback NÃO aponta para v${NEW_PROTO}!"
            ERRORS=$((ERRORS + 1))
          fi

          DUPES=$(grep -cP "^\s*\{\s*${NEW_PROTO}\s*," Lunaris/src/main/cpp/ProtocolHelper.cpp || true)
          if [ "$DUPES" -gt 1 ]; then
            echo "❌ Entrada duplicada! (${DUPES} ocorrências de ${NEW_PROTO})"
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ Sem duplicatas."
          fi

          echo ""
          echo "=== Lunaris.cpp ==="
          if grep -q "setVersion" Lunaris/src/main/cpp/Lunaris.cpp && \
             grep "setVersion" Lunaris/src/main/cpp/Lunaris.cpp | grep -q "\"${NEW_MC}\""; then
            echo "✅ Version string '${NEW_MC}' encontrada no setVersion."
          else
            echo "❌ Version string '${NEW_MC}' NÃO encontrada no setVersion!"
            ERRORS=$((ERRORS + 1))
          fi

          if grep -q "setProtocolVersion" Lunaris/src/main/cpp/Lunaris.cpp && \
             grep "setProtocolVersion" Lunaris/src/main/cpp/Lunaris.cpp | grep -qP "\b${NEW_PROTO}\b"; then
            echo "✅ ProtocolVersion ${NEW_PROTO} encontrado no setProtocolVersion."
          else
            echo "❌ ProtocolVersion ${NEW_PROTO} NÃO encontrado no setProtocolVersion!"
            ERRORS=$((ERRORS + 1))
          fi

          echo ""
          echo "=== Codec local ==="
          CODEC_PATH="Protocol/bedrock-codec/src/main/java/org/cloudburstmc/protocol/bedrock/codec/v${NEW_PROTO}"
          if [ -d "$CODEC_PATH" ]; then
            echo "✅ Pasta do codec v${NEW_PROTO} existe."
          else
            echo "❌ Pasta do codec v${NEW_PROTO} NÃO existe!"
            ERRORS=$((ERRORS + 1))
          fi

          echo ""
          echo "=== Pasta data/ ==="
          DATA_PATH="Protocol/bedrock-codec/src/main/java/org/cloudburstmc/protocol/bedrock/data"
          if [ -d "$DATA_PATH" ]; then
            echo "✅ Pasta data/ existe ($(find "$DATA_PATH" -name '*.java' | wc -l) arquivos .java)."
          else
            echo "⚠️  Pasta data/ não existe localmente (pode não ser necessária para esta versão)."
          fi

          echo ""
          echo "=== Resumo ==="
          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ Validação falhou com ${ERRORS} erro(s)."
            exit 1
          else
            echo "✅ Todas as validações passaram!"
          fi

      # ────────────────────────────────────────────────────────
      # 8. COMMIT + PUSH + PR
      # ────────────────────────────────────────────────────────
      - name: 🔀 Commit e Push
        id: commit_push
        run: |
          BRANCH="auto-update/bedrock-${{ inputs.mc_version }}-proto-${{ inputs.protocol_version }}"
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Adiciona todos os arquivos (incluindo os novos/untracked) ao índice do Git
          git add -A

          # Verifica se há mudanças usando git status (o git diff ignora arquivos novos)
          CHANGED=$(git status --porcelain)
          if [ -z "$CHANGED" ]; then
            echo "ℹ️  Nenhuma alteração detectada — nada a commitar."
            echo "branch=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Arquivos alterados:"
          echo "$CHANGED"

          git checkout -b "$BRANCH"
          git commit -m "feat: Add Minecraft Bedrock ${{ inputs.mc_version }} support (protocol v${{ inputs.protocol_version }})"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          
      - name: 📬 Criar Pull Request
        if: steps.commit_push.outputs.branch != ''
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ steps.commit_push.outputs.branch }}
          NEW_MC: ${{ inputs.mc_version }}
          NEW_PROTO: ${{ inputs.protocol_version }}
          CODEC_EXISTS: ${{ steps.update_protocol.outputs.codec_exists }}
        with:
          script: |
            const newMC    = process.env.NEW_MC;
            const newProto = process.env.NEW_PROTO;
            const branch   = process.env.BRANCH;
            const codecExists = process.env.CODEC_EXISTS;

            const codecLine = codecExists === 'true'
              ? `> ✅ Codec local \`v${newProto}\` encontrado em \`Protocol/bedrock-codec/\`.`
              : `> ⚠️ **ATENÇÃO**: O codec \`v${newProto}\` **NÃO foi encontrado** no upstream.`;

            const body = [
              `## Atualização: Minecraft Bedrock ${newMC}`,
              "",
              "Gerado automaticamente pelo workflow de atualização.",
              "",
              codecLine,
              "",
              "### Arquivos alterados:",
              `- \`Lunaris/src/main/cpp/ProtocolHelper.cpp\` — nova entrada v${newProto} + fallback`,
              `- \`Lunaris/src/main/cpp/Lunaris.cpp\` — version string (${newMC}) + protocolVersion (${newProto})`,
              `- \`Protocol/bedrock-codec/.../codec/v${newProto}/\` — codec sincronizado`,
              `- \`Protocol/bedrock-codec/.../data/\` — classes de dados sincronizadas (no-clobber)`,
              `- \`AutoCodecPacketListener.kt\` — verificado`,
              "",
              "### Checklist:",
              "- [ ] Build completo (arm64-v8a, armeabi-v7a, x86, x86_64)",
              "- [ ] Testar conexão com servidor Bedrock",
              "- [ ] Confirmar ausência de duplicatas na tabela de protocolos",
            ].join("\n");

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `feat: Minecraft Bedrock ${newMC} support (protocol v${newProto})`,
              head: branch,
              base: "main",
              body: body,
            });
